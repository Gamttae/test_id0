<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Digital ID Card</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Desktop Warning -->
  <div id="desktop-warning">
    <div class="warning-content">
      <div class="warning-icon">!</div>
      <h1>스마트폰으로 봐주세요</h1>
      <p>이 웹사이트는 모바일 환경에 최적화되어 있습니다.</p>
    </div>
  </div>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-console">
      <p class="cmd-text">> SYSTEM INITIALIZATION...</p>
      <p class="cmd-text">> CONNECTING TO SERVER...</p>
      <div class="progress-bar-container">
        <span class="bracket">[</span>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-bar-fill"></div>
        </div>
        <span class="bracket">]</span>
        <span class="percentage" id="loading-percentage">0%</span>
      </div>
      <p class="cmd-text blink">LOADING ASSETS...</p>
    </div>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <div class="endfield-bg">
      <div class="grid-layer"></div>
      <div class="crosses">
        <div class="cross" style="top: 10%; left: 10%;"></div>
        <div class="cross" style="top: 10%; right: 10%;"></div>
        <div class="cross" style="bottom: 15%; left: 15%;"></div>
        <div class="cross" style="bottom: 10%; right: 10%;"></div>
      </div>
      <div class="tech-elements">
        <div class="tech-text" style="top: 20%; left: 5%;">SYS_OP_1.0</div>
        <div class="tech-text" style="bottom: 5%; right: 5%;">ENDFIELD PROTOCOL</div>
        <div class="yellow-stripe"></div>
        <div class="yellow-stripe-vertical"></div>
      </div>
    </div>
    
    <div class="scene">
      <div class="card" id="id-card">
        <!-- Front of Card -->
        <div class="card-face card-front">
          <div class="card-header">
            <span class="corp-logo">ENDFIELD ID</span>
            <span class="status-indicator"></span>
          </div>
          <div class="profile-section">
            <div class="profile-pic-container">
               <canvas id="mosaic-canvas" width="120" height="120"></canvas>
            </div>
            <div class="info-group">
              <label>NAME</label>
              <div class="value">홍길동</div>
            </div>
            <div class="info-group" style="margin-top: 15px;">
              <label>DEPARTMENT</label>
              <div class="value dept-value">미래기술융합학과</div>
            </div>
          </div>
          <div class="card-footer">
            <div class="barcode"></div>
            <span class="footer-text">CLASSIFIED</span>
          </div>
        </div>
        
        <!-- Back of Card -->
        <div class="card-face card-back">
           <div class="school-logo-container">
              <div class="school-logo">
                <div class="logo-circle"></div>
                <div class="logo-inner">UNIV</div>
              </div>
           </div>
           <div class="secure-info">
             <div class="info-group">
               <label>STUDENT ID <span class="req-flips">(REQ: 2 FLIPS)</span></label>
               <div class="value secret-value" id="student-id" data-target="20261234" data-req="2">########</div>
             </div>
             <div class="info-group" style="margin-top: 20px;">
               <label>ACCOUNT ID <span class="req-flips">(REQ: 7 FLIPS)</span></label>
               <div class="value secret-value" id="account-id" data-target="admin_hong" data-req="7">##########</div>
             </div>
           </div>
           <div class="card-footer reverse-footer">
            <span>AUTHORIZED PERSONNEL ONLY</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
