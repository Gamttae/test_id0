<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital ID Card</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Desktop Warning -->
    <div id="desktop-warning">
        <div class="warning-content">
            <div class="warning-icon">⚠</div>
            <h1>스마트폰 전용 페이지</h1>
            <p>모바일 기기에서 접속해주세요.</p>
        </div>
    </div>

    <!-- Loading Screen (Endfield Theme) -->
    <div id="loading-screen">
        <div class="center-logo">
            <div class="logo-text">명일방주<br><span>엔드필드</span></div>
        </div>

        <div class="bottom-ui">
            <div class="progress-section">
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progress-bar-fill"></div>
                </div>
                <div class="percentage-display">
                    <span class="vertical-line"></span>
                    <span id="loading-percentage">0</span><span class="percent-sign">%</span>
                </div>
                <div class="sub-text">
                    <div class="dots-grid">
                        <span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <p>Updating...</p>
                    <p class="micro-text">MISSION DEPENDENT PAYLOAD</p>
                    <p class="micro-text">SYSTEM INTERFACES</p>
                </div>
            </div>
            <div class="bottom-footer">
                OVER THE FRONTIER / INTO THE FRONT
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <div class="endfield-bg">
            <canvas id="bg-particles"></canvas>
            <div class="bg-overlay">
                <!-- Concentric circles and tech elements -->
                <div class="tech-circle outer"></div>
                <div class="tech-circle inner"></div>
            </div>
            <div class="grid-layer"></div>
        </div>

        <div class="scene">
            <div class="card" id="id-card">
                <!-- Front of Card -->
                <div class="card-face card-front">
                    <div class="card-header">
                        <span class="corp-logo">LORE / ENDFIELD</span>
                        <div class="accent-lines">
                            <div class="line yellow"></div>
                            <div class="line cyan"></div>
                            <div class="line magenta"></div>
                        </div>
                    </div>
                    <div class="profile-section">
                        <div class="profile-frame">
                            <canvas id="mosaic-canvas" width="90" height="90"></canvas>
                        </div>
                        <div class="info-group">
                            <label>OPERATOR NAME</label>
                            <div class="value">홍길동</div>
                        </div>
                        <div class="info-group">
                            <label>ASSIGNMENT</label>
                            <div class="value dept-value">미래기술융합학과</div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="tech-barcode">
                            ||| | || | || | |||| |
                        </div>
                        <span class="footer-text">DIJIANG / ARKNIGHTS</span>
                    </div>
                </div>

                <!-- Back of Card -->
                <div class="card-face card-back">
                    <div class="school-logo-container">
                        <div class="school-logo">
                            <div class="logo-bracket">[</div>
                            <div class="logo-inner">UNIV</div>
                            <div class="logo-bracket">]</div>
                        </div>
                    </div>
                    <div class="secure-info">
                        <div class="info-group">
                            <label>STUDENT_ID <span class="req-flips">[FLIP x2]</span></label>
                            <div class="value secret-value" id="student-id" data-target="20261234" data-req="2">########
                            </div>
                        </div>
                        <div class="info-group">
                            <label>ACCOUNT_ID <span class="req-flips">[FLIP x7]</span></label>
                            <div class="value secret-value" id="account-id" data-target="admin_hong" data-req="7">
                                ##########</div>
                        </div>
                    </div>
                    <div class="card-footer reverse-footer">
                        <span>RESTRICTED ACCESS</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
