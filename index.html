<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber-ID</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Desktop Warning -->
    <div id="desktop-warning">
        <div class="warning-box glitch-box">
            <div class="warning-icon">⚠</div>
            <h1 class="cyber-txt">SYSTEM.ERROR</h1>
            <p>UNAUTHORIZED RESOLUTION DETECTED.</p>
            <p class="kor-text">모바일 기기로 접속하십시오.</p>
        </div>
    </div>

    <!-- Loading Screen (Pure CMD Style with Mountain BG) -->
    <div id="loading-screen">
        <!-- Mountain Vector Background -->
        <div class="mountain-bg"></div>
        <div class="mountain-bg bg-overlay"></div>
        <div class="loading-grid"></div>

        <div class="lore-text">
            <p class="lore-title"><span class="yellow-accent">TIPS:</span> 탈로스 II 상식</p>
            <p class="lore-desc">높은 하늘 너머, 거대 기체 행성 '탈로스'는 여전히 미스터리로 가득합니다.</p>
        </div>

        <!-- Pure console-like UI at the bottom -->
        <div class="cmd-footer">
            <div class="cmd-row">
                <span class="cmd-bracket">[</span>
                <div class="cmd-progress-track">
                    <div class="cmd-progress-fill" id="cmd-progress-fill"></div>
                    <div class="cmd-progress-head" id="cmd-progress-head"></div>
                </div>
                <span class="cmd-bracket">]</span>
                <span class="cmd-loading-text">NOW LOADING...</span>
                <span class="cmd-spinner" id="cmd-spinner">/</span>
            </div>
            <div class="cmd-stats">
                <span class="signal-bars"></span> <span class="ping-text">527ms</span>
                <span class="uid-text">UID: 4237364424</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <div class="cyber-bg main-bg">
            <div class="main-gradient-bg"></div>
            <div class="main-grid-layer"></div>
            <canvas id="bg-particles"></canvas>

            <!-- Tech decals -->
            <div class="lore-header">
                <div class="lore-icon"></div>
                <div>
                    <div class="lore-subtitle">LORE</div>
                    <div class="lore-title-main">세계관 소개</div>
                </div>
                <div class="color-bars"></div>
            </div>

            <div class="bg-overlay">
                <div class="tech-circle outer"></div>
                <div class="tech-circle inner"></div>
            </div>
        </div>

        <div class="scene">
            <div class="card" id="id-card">

                <!-- Front of Card -->
                <div class="card-face card-front">
                    <div class="corner top-left"></div>
                    <div class="corner top-right"></div>
                    <div class="corner bottom-left"></div>
                    <div class="corner bottom-right"></div>

                    <div class="card-header">
                        <div class="faction-icon">
                            <!-- Placeholder for faction icon -->
                        </div>
                    </div>
                    <div class="profile-section">
                        <div class="profile-frame">
                            <canvas id="mosaic-canvas" width="120" height="120"></canvas>
                        </div>
                        <div class="info-group main-name">
                            <div class="value cyber-txt" data-text="DIJIANG">DIJIANG</div>
                            <label>ARKNIGHTS: ENDFIELD</label>
                        </div>

                        <div class="operator-details">
                            <div class="detail-row">
                                <span class="label">NAME</span>
                                <span class="val">홍길동</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">DEPT</span>
                                <span class="val">미래기술융합학과</span>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer">
                        <div class="pagination">
                            <div class="arrow left">&lt;</div>
                            <div class="page-info"><span class="yellow-accent">1/6</span> ID DATA</div>
                            <div class="arrow right">&gt;</div>
                        </div>
                    </div>
                </div>

                <!-- Back of Card -->
                <div class="card-face card-back">
                    <div class="corner top-left"></div>
                    <div class="corner top-right"></div>
                    <div class="corner bottom-left"></div>
                    <div class="corner bottom-right"></div>

                    <div class="school-logo-container">
                        <div class="school-logo cyber-txt">
                            &lt;UNIV&gt;
                        </div>
                    </div>

                    <div class="secure-info">
                        <div class="info-group">
                            <label>STUDENT_ID <span class="req-flips">[FLIPx2]</span></label>
                            <div class="value secret-value glitch-text" id="student-id" data-target="20261234"
                                data-req="2">########</div>
                        </div>
                        <div class="info-group">
                            <label>ACCOUNT_ID <span class="req-flips">[FLIPx7]</span></label>
                            <div class="value secret-value glitch-text" id="account-id" data-target="admin_hong"
                                data-req="7">##########</div>
                        </div>
                    </div>

                    <div class="card-footer reverse-footer">
                        <span class="yellow-accent">RESTRICTED_DATA</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
