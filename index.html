<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital ID Card</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@500;700;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Desktop Warning -->
    <div id="desktop-warning">
        <div class="warning-content">
            <div class="warning-icon">📱</div>
            <h1>스마트폰으로 접속해주세요</h1>
            <p>모바일 환경에 최적화된 인터랙티브 웹입니다.</p>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="google-loader">
                <span class="dot red"></span>
                <span class="dot blue"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <div class="loading-console">
                <p class="cmd-text">> INITIALIZING ENDFIELD SYSTEM</p>
                <div class="progress-bar-container">
                    <div class="progress-bar-track">
                        <div class="progress-bar-fill" id="progress-bar-fill"></div>
                    </div>
                </div>
                <p class="cmd-text center" id="loading-percentage">0%</p>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <div class="endfield-bg">
            <div class="grid-layer"></div>
            <div class="crosses">
                <div class="cross" style="top: 15%; left: 10%;"></div>
                <div class="cross" style="top: 25%; right: 15%;"></div>
                <div class="cross" style="bottom: 20%; left: 20%;"></div>
                <div class="cross" style="bottom: 10%; right: 10%;"></div>
            </div>
            <div class="tech-elements">
                <div class="tech-text" style="top: 10%; left: 5%;">SYS_OP_1.0 // MATERIAL REVISION</div>
                <div class="tech-text" style="bottom: 5%; right: 5%;">ENDFIELD PROTOCOL ACTIVE</div>
                <div class="yellow-stripe"></div>
                <div class="yellow-stripe-vertical"></div>
            </div>
        </div>

        <div class="scene">
            <div class="card" id="id-card">
                <!-- Front of Card -->
                <div class="card-face card-front">
                    <div class="card-header">
                        <div class="brand">
                            <span class="logo-G">G</span>
                            <span class="corp-logo">ENDFIELD ID</span>
                        </div>
                        <span class="status-indicator"></span>
                    </div>
                    <div class="profile-section">
                        <div class="profile-pic-wrapper">
                            <canvas id="mosaic-canvas" width="100" height="100"></canvas>
                        </div>
                        <div class="info-group">
                            <label>Name</label>
                            <div class="value">홍길동</div>
                        </div>
                        <div class="info-group">
                            <label>Department</label>
                            <div class="value dept-value">미래기술융합학과</div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="barcode"></div>
                        <span class="footer-text">CLASSIFIED PROFILE</span>
                    </div>
                </div>

                <!-- Back of Card -->
                <div class="card-face card-back">
                    <div class="school-logo-container">
                        <div class="school-logo">
                            <div class="logo-circle"></div>
                            <div class="logo-inner">UNIV</div>
                        </div>
                    </div>
                    <div class="secure-info">
                        <div class="info-group">
                            <label>Student ID <span class="req-flips">(2 Flips Req)</span></label>
                            <div class="value secret-value" id="student-id" data-target="20261234" data-req="2">########
                            </div>
                        </div>
                        <div class="info-group">
                            <label>Account ID <span class="req-flips">(7 Flips Req)</span></label>
                            <div class="value secret-value" id="account-id" data-target="admin_hong" data-req="7">
                                ##########</div>
                        </div>
                    </div>
                    <div class="card-footer reverse-footer">
                        <span>AUTHORIZED PERSONNEL ONLY</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
